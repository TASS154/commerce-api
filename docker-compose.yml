services:
  postgres:
    image: postgres:16-alpine
    container_name: vespera-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vespera
      POSTGRES_PASSWORD: vespera
      POSTGRES_DB: vespera
    volumes:
      - vespera_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vespera -d vespera"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  vespera_pg:
